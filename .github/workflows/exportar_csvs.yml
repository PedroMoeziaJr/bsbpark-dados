name: Exportar Calendario CSV

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  exportar:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Instalar requests
        run: pip install requests
      
      - name: Exportar calendario.csv
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python exportar_csvs.py
      
      - name: Configurar git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
      
      - name: Commit e push
        run: |
          if ! git diff --quiet csvs/; then
            git add csvs/calendario.csv
            git commit -m "calendario.csv atualizado — $(date +'%d/%m/%Y %H:%M')"
            git push origin main
          else
            echo "Sem mudanças para commitar"
          fi
